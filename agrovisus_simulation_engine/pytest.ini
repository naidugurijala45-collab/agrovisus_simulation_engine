[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    # Fail on warnings by default to catch regressions
    # error
    
    # Ignore specific warnings from third-party libs if unavoidable
    ignore::DeprecationWarning:dateutil.*
    ignore::DeprecationWarning:pkg_resources.*
